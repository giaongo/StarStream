services:
  backend: 
    # build: ./backend
    image: giaongo/backend_starstream:1.0
    ports:
      - "5001:5001"
    volumes:
      # - ./backend:/backend
      - thumbnail-volume:/backend/thumbnails
    container_name: backend
    depends_on:
      postgresql:
          condition: service_healthy
  
  postgresql:
    # image: postgres
    image: giaongo/postgres_starstream:1.0
    ports:
      - 5432:5432
    volumes:
      - persist-volume:/var/lib/postgresql/data
      # - ./postgres/db.sql:/docker-entrypoint-initdb.d/init.sql
    env_file:
      - ./backend/.env
    container_name: postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U streamuser -d starstream_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  frontend:
    # build: ./frontend
    image: giaongo/frontend_starstream:1.0
    ports:
      - "5173:5173"
    # volumes:
    #   - ./frontend:/frontend
    #   - /frontend/node_modules
    container_name: frontend
    depends_on:
      - postgresql
      - backend

volumes:
  persist-volume:
  thumbnail-volume: